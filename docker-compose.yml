services:
  mining-dashboard:
    build: .
    container_name: mining-profitability
    restart: unless-stopped
    ports:
      - "5000:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - FLASK_HOST=0.0.0.0
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./cache:/app/cache
