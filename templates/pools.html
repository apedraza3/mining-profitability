{% extends "base.html" %}
{% block title %}Pool Comparison - Mining Dashboard{% endblock %}

{% block content %}
    <div class="tool-page">
        <div class="tool-page-header">
            <h2>Pool Recommendations</h2>
            <p class="tool-desc">See which mining pools are best for your setup, ranked by fees. Lower fees = more profit.</p>
        </div>

        <div class="analysis-panel">
            <div id="poolComparisonContent">
                <p style="color:var(--text-muted)">Loading pool data...</p>
            </div>
        </div>
    </div>
{% endblock %}

{% block scripts %}
    <script src="/static/js/analysis-tools.js?v=10"></script>
    <script>
        dashboardData = null;
        fetch('/api/pool-summary')
            .then(r => r.json())
            .then(data => {
                dashboardData = data;
                try {
                    renderPoolComparison();
                } catch(e) {
                    console.error('renderPoolComparison error:', e);
                    document.getElementById('poolComparisonContent').innerHTML = '<p style="color:var(--danger)">Error: ' + e.message + '</p>';
                }
            })
            .catch(err => {
                console.error('Fetch error:', err);
                document.getElementById('poolComparisonContent').innerHTML = '<p style="color:var(--danger)">Failed to load data: ' + err.message + '</p>';
            });
    </script>
{% endblock %}
